name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  quality:
    name: Quality and security gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --no-deps -e .

      - name: Ruff
        run: ruff check --select ALL .

      - name: Code shape
        run: python tools/code_shape.py src

      - name: Mypy
        run: mypy --strict src/

      - name: Pytest
        run: pytest --cov=src --cov-report=xml --cov-fail-under=85

      - name: Bandit
        run: bandit -r src/ -ll

      - name: pip-audit
        run: pip-audit

      - name: Semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: "p/python p/security-audit"

      - name: Docker build
        run: docker build -t aws-iam-analyzer:${{ github.sha }} .

      - name: Trivy image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: aws-iam-analyzer:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy config
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "1"

      - name: Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"

          {
            echo "tags<<EOF"
            echo "${image_name}:${GITHUB_SHA}"
            echo "${image_name}:sha-${GITHUB_SHA}"

            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${image_name}:latest"
            fi

            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              version="${GITHUB_REF_NAME#v}"
              echo "${image_name}:${GITHUB_REF_NAME}"
              echo "${image_name}:${version}"
              echo "${image_name}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
