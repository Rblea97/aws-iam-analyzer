name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  quality:
    name: Quality and security gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --no-deps -e .

      - name: Ruff
        run: ruff check --select ALL .

      - name: Code shape
        run: python tools/code_shape.py src

      - name: Mypy
        run: mypy --strict src/

      - name: Pytest
        run: pytest --cov=src --cov-report=xml --cov-fail-under=85

      - name: Bandit
        run: bandit -r src/ -ll

      - name: pip-audit
        run: pip-audit

      - name: Semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: "p/python p/security-audit"

      - name: Docker build
        run: docker build -t aws-iam-analyzer:${{ github.sha }} .

      - name: Trivy image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: aws-iam-analyzer:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy config
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "1"

      - name: Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source=/repo --redact --verbose

  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"

          {
            echo "tags<<EOF"
            echo "${image_name}:${GITHUB_SHA}"
            echo "${image_name}:sha-${GITHUB_SHA}"

            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${image_name}:latest"
            fi

            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              version="${GITHUB_REF_NAME#v}"
              echo "${image_name}:${GITHUB_REF_NAME}"
              echo "${image_name}:${version}"
              echo "${image_name}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
